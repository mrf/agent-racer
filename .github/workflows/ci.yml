name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GOLANGCI_LINT_VERSION: v2.10.1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run race-enabled backend tests with coverage
        run: cd backend && go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Backend coverage summary
        run: cd backend && go tool cover -func=coverage.out | tail -1

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out

      - name: Run golangci-lint
        run: |
          cd backend
          golangci-lint run --config ../.golangci.yml

  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run Vitest with coverage
        run: cd frontend && npx vitest run --coverage

      - name: Frontend coverage summary
        run: jq '.total' frontend/coverage/coverage-summary.json

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        run: cd e2e && npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: cd e2e && npx playwright install --with-deps chromium firefox

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: cd e2e && npx playwright install-deps chromium firefox

      - name: Run lifecycle E2E tests
        run: cd e2e && npx playwright test tests/session-lifecycle.spec.ts

      - name: Run remaining E2E tests
        run: cd e2e && npx playwright test --grep-invert "Session lifecycle"

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: e2e/test-results/

  tui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tui/go.mod
          cache-dependency-path: tui/go.sum

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build TUI binary
        run: make tui

      - name: Run TUI tests with coverage
        run: cd tui && go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: TUI coverage summary
        run: cd tui && go tool cover -func=coverage.out | tail -1

      - name: Upload TUI coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tui-coverage
          path: tui/coverage.out

      - name: Run TUI lint
        run: make tui-lint

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build binary
        run: make build
