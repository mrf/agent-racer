<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Real-time racing visualization of AI coding agents competing across tasks">
  <meta name="theme-color" content="#16213e">

  <!-- Open Graph -->
  <meta property="og:title" content="Agent Racing Dashboard">
  <meta property="og:description" content="Real-time racing visualization of AI coding agents competing across tasks">
  <meta property="og:type" content="website">

  <title>Agent Racing Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header id="header">
    <div class="header-left">
      <h1>Agent Racing Dashboard</h1>
    </div>
    <div class="header-right">
      <span id="session-count">0 sessions</span>
      <span class="connection-status-group">
        <span id="connection-status" class="status-dot disconnected" aria-hidden="true"></span>
        <span id="connection-status-label" class="connection-status-label">Offline</span>
      </span>
    </div>
  </header>
  <div id="connection-help" class="connection-help hidden" role="status" aria-live="polite"></div>

  <div id="battlepass-bar"></div>

  <div id="race-container">
    <canvas id="race-canvas"></canvas>
  </div>

  <div id="detail-flyout" class="hidden">
    <div class="flyout-header">
      <span>Session Details</span>
      <button id="flyout-close">×</button>
    </div>
    <div id="flyout-content"></div>
  </div>

  <div id="debug-panel" class="hidden">
    <div class="debug-header">
      <span>Debug Log</span>
      <button id="debug-close">X</button>
    </div>
    <div id="debug-log"></div>
  </div>

  <div id="shortcut-bar"></div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
